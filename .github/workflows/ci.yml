name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Format ───────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Core tests (multi-OS) ──────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run core tests
        run: cargo test -p zapcode-core

  # ── JS bindings — build + e2e ───────────────────────────────────────
  e2e-js:
    name: E2E — JS bindings
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('crates/zapcode-js/package.json', 'examples/typescript/basic/package.json') }}
      - name: Build JS bindings
        working-directory: crates/zapcode-js
        run: |
          npm install
          npx napi build --release --platform --js index.js --dts index.d.ts
      - name: Run basic example
        working-directory: examples/typescript/basic
        run: |
          npm install
          npx tsx main.ts

  # ── Python bindings — build + e2e ───────────────────────────────────
  e2e-python:
    name: E2E — Python bindings
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Create venv and install maturin
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin
      - name: Copy README
        run: cp README.md crates/zapcode-py/README.md
      - name: Build Python bindings
        working-directory: crates/zapcode-py
        run: |
          source ${{ github.workspace }}/.venv/bin/activate
          maturin develop --release
      - name: Run basic example
        working-directory: examples/python/basic
        run: |
          source ${{ github.workspace }}/.venv/bin/activate
          python main.py

  # ── WASM — build + smoke test ───────────────────────────────────────
  e2e-wasm:
    name: E2E — WASM
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Cache wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ runner.os }}
      - name: Install wasm-pack
        run: which wasm-pack || curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build crates/zapcode-wasm --target web --release
      - name: Verify output
        run: |
          test -f crates/zapcode-wasm/pkg/zapcode_wasm.js
          test -f crates/zapcode-wasm/pkg/zapcode_wasm_bg.wasm
          echo "WASM build OK — $(du -h crates/zapcode-wasm/pkg/zapcode_wasm_bg.wasm | cut -f1) bundle"

  # ── Performance smoke test ──────────────────────────────────────────
  bench:
    name: Benchmarks
    needs: [test, e2e-js, e2e-python, e2e-wasm]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: cargo bench -p zapcode-core 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee bench-output.txt
        env:
          CARGO_TERM_COLOR: never
      - name: Post benchmark results on PR
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('bench-output.txt', 'utf8');
            const body = `## Benchmark Results\n\n\`\`\`\n${output}\n\`\`\``;
            const comments = await github.paginate(github.rest.issues.listComments, {
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.startsWith('## Benchmark Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }

  # ── Security audit ──────────────────────────────────────────────────
  security:
    name: Security
    needs: [test, e2e-js, e2e-python, e2e-wasm]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Dependency audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Sandbox invariant check — no forbidden std usage
        run: |
          echo "Checking zapcode-core for forbidden imports..."
          FORBIDDEN_PATTERNS=(
            "std::fs::"
            "std::env::"
            "std::net::"
            "tokio::net::"
            "std::process::"
          )
          FAILED=0
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            if grep -rn "$pattern" crates/zapcode-core/src/ 2>/dev/null; then
              echo "FAIL: Found forbidden import '$pattern' in zapcode-core"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "Sandbox invariant violated — zapcode-core must not use filesystem, env, network, or process APIs"
            exit 1
          fi
          echo "All sandbox invariant checks passed"
      - name: Check for unsafe blocks without SAFETY comments
        run: |
          echo "Checking for unsafe blocks without SAFETY comments..."
          # Find unsafe blocks and check the preceding line has a SAFETY comment
          UNSAFE_FILES=$(grep -rn "unsafe " crates/zapcode-core/src/ --include="*.rs" -l 2>/dev/null || true)
          FAILED=0
          for file in $UNSAFE_FILES; do
            while IFS=: read -r line_num _; do
              prev_line=$((line_num - 1))
              prev_content=$(sed -n "${prev_line}p" "$file")
              if ! echo "$prev_content" | grep -qi "SAFETY"; then
                echo "WARN: $file:$line_num — unsafe block without SAFETY comment on preceding line"
              fi
            done < <(grep -n "unsafe " "$file" 2>/dev/null || true)
          done
          echo "Unsafe audit complete"
