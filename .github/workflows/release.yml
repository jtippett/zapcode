name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no publish)"
        type: boolean
        default: true
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Publish to crates.io ────────────────────────────────────────────
  publish-crate:
    name: Publish crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Dry run
        if: inputs.dry_run
        run: cargo publish -p zapcode-core --dry-run
      - name: Publish zapcode-core
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p zapcode-core || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Build native npm binaries (per-platform) ────────────────────────
  build-npm:
    name: Build npm (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Install dependencies
        working-directory: crates/zapcode-js
        run: npm install
      - name: Build native module
        working-directory: crates/zapcode-js
        run: npx napi build --release --platform --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/zapcode-js/zapcode.*.node
          if-no-files-found: error

  # ── Publish all npm packages ─────────────────────────────────────────
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: build-npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Copy README
        run: cp README.md crates/zapcode-js/README.md
      - name: Install dependencies
        working-directory: crates/zapcode-js
        run: npm install
      - name: Generate platform packages
        working-directory: crates/zapcode-js
        run: npx napi create-npm-dirs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/zapcode-js/artifacts
      - name: Move artifacts to correct locations
        working-directory: crates/zapcode-js
        run: npx napi artifacts --output-dir artifacts
      - name: List packages
        working-directory: crates/zapcode-js
        run: ls -R npm/
      - name: Publish platform packages
        if: ${{ !inputs.dry_run }}
        working-directory: crates/zapcode-js
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $(basename $dir)..."
              cd "$dir"
              npm publish --access public --tag latest || true
              cd ../..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package
        if: ${{ !inputs.dry_run }}
        working-directory: crates/zapcode-js
        run: npm publish --access public --tag latest || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build zapcode-ai
        working-directory: packages/zapcode-ai
        run: |
          npm install
          npm run build
      - name: Copy README to zapcode-ai
        run: cp README.md packages/zapcode-ai/README.md
      - name: Publish zapcode-ai
        if: ${{ !inputs.dry_run }}
        working-directory: packages/zapcode-ai
        run: npm publish --access public --tag latest || echo "Already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Build & publish PyPI (per-platform) ──────────────────────────────
  build-pypi:
    name: Build PyPI (${{ matrix.os }}-${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
            interpreter: "3.10 3.11 3.12"
          - os: macos-latest
            target: x86_64
            manylinux: auto
          - os: macos-latest
            target: aarch64
            manylinux: auto
          - os: windows-latest
            target: x64
            manylinux: auto
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Copy README
        run: cp README.md crates/zapcode-py/README.md
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist -m crates/zapcode-py/Cargo.toml ${{ matrix.interpreter && format('-i {0}', matrix.interpreter) || '' }}
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: build-pypi
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  # ── Publish zapcode-ai Python wrapper ────────────────────────────────
  publish-pypi-ai:
    name: Publish PyPI (zapcode-ai)
    runs-on: ubuntu-latest
    needs: publish-pypi
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Copy README
        run: cp README.md packages/zapcode-ai-python/README.md
      - name: Install build tools
        run: pip install build twine
      - name: Build wheel
        working-directory: packages/zapcode-ai-python
        run: python -m build
      - name: Publish to PyPI
        working-directory: packages/zapcode-ai-python
        run: twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── GitHub Release ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    needs: [publish-crate, publish-npm, publish-pypi, publish-pypi-ai]
    steps:
      - uses: actions/checkout@v6
      - name: Get version from Cargo.toml
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: v${{ steps.version.outputs.version }}
